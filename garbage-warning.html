<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Предупреждение о штрафах за вывоз мусора</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f8f9fa;
            color: #343a40;
            margin: 50px;
            padding: 20px;
            border: 1px solid #dee2e6;
            border-radius: 5px;
        }
        h1 {
            color: #dc3545;
        }
        .warning {
            background-color: #fff3cd;
            border: 1px solid #ffeeba;
            padding: 10px;
            border-radius: 5px;
        }
        .fine {
            font-weight: bold;
            color: #856404;
        }
    </style>
</head>
<body>
    <h1>Внимание!</h1>
    <div class="warning">
        <p>Нарушение правил утилизации мусора может привести к штрафам!</p>
        <p class="fine">Штрафы за неправильное обращение с мусором составляют до 10,000 рублей.</p>
        <p>Пожалуйста, соблюдайте правила и не выбрасывайте мусор в запрещенных местах!</p>
    </div>
</body>
</html>
